title: ChartHorizon
tagline: The Weekly Tape
description: >-
  Weekly futures positioning notes — where season, producer positioning,
  hedging program and term structure line up. Data: ChartHorizon.
url: https://chart-horizon.com
baseurl: ""
author: ChartHorizon

# Default social-share image (Open Graph / Twitter). 1.91:1 (1200×630) is ideal.
# Per-post `image:` front matter overrides this; replace the file to rebrand without touching config.
og_image: /assets/og-default.png

markdown: kramdown

# SEO plugins — both ship with the `github-pages` gem, so no Gemfile change needed.
# jekyll-sitemap → /sitemap.xml · jekyll-feed → /feed.xml
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Search-engine ownership verification. Paste the token from the provider's
# "HTML tag" verification method (just the content value, not the whole tag),
# then submit https://chart-horizon.com/sitemap.xml inside their console.
#   Google Search Console → https://search.google.com/search-console
#   Bing Webmaster Tools  → https://www.bing.com/webmasters
google_site_verification: "2CJ61hpNB-e-4qrgSS79xAPnwaOq4N-iFPaDpQmga5s"
bing_site_verification: ""

# Pretty, date-based URLs for posts only. A top-level `permalink:` would also rewrite
# pages (index, impressum, privacy) and break their .html paths — so scope it to posts.
defaults:
  - scope: { path: "", type: posts }
    values: { permalink: /:year/:month/:day/:title/ }

# Files that live in the repo but must not be published as-is.
exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor/
